<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — CallMetric Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-card {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-icon {
      font-size: 3rem;
      color: #64748b;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: #fff;
      box-shadow: 0 4px 14px rgba(6, 182, 212, 0.25);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .btn-secondary {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
    }
    .btn-secondary:hover { border-color: #06b6d4; color: #06b6d4; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-icon"><i class="fas fa-map-signs"></i></div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ha sido movida.<br>Verifica la URL o vuelve al inicio.</p>
    <div class="btn-group">
      <a class="btn btn-primary" href="/callmetric-lading-page/"><i class="fas fa-home"></i> Ir al inicio</a>
      <a class="btn btn-secondary" href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Volver atrás</a>
    </div>
  </div>
</body>
</html>
